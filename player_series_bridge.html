
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);color:var(--color-text-primary)}
.wrap{padding:1rem 0}
.drop-zone{border:1.5px dashed var(--color-border-secondary);border-radius:var(--border-radius-lg);padding:2rem;text-align:center;cursor:pointer;transition:background .15s;margin-bottom:1rem}
.drop-zone:hover,.drop-zone.drag{background:var(--color-background-secondary)}
.drop-zone p{font-size:14px;color:var(--color-text-secondary);margin-top:.5rem}
textarea{width:100%;height:120px;font-family:var(--font-mono);font-size:12px;padding:.75rem;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-primary);resize:vertical;display:block}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:.75rem}
button{font-size:13px;padding:6px 14px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-primary);cursor:pointer}
button:hover{background:var(--color-background-secondary)}
button.primary{background:#185FA5;border-color:#185FA5;color:#E6F1FB}
button.primary:hover{background:#0C447C}
button:disabled{opacity:.4;cursor:not-allowed}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:var(--border-radius-md);font-weight:500}
.badge-blue{background:#E6F1FB;color:#0C447C}
.badge-teal{background:#E1F5EE;color:#085041}
.badge-amber{background:#FAEEDA;color:#633806}
.badge-gray{background:#F1EFE8;color:#444441}
.badge-green{background:#EAF3DE;color:#27500A}
.entry{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem;display:flex;align-items:center;gap:12px;margin-bottom:8px}
.entry-main{flex:1;min-width:0}
.entry-title{font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.entry-meta{font-size:12px;color:var(--color-text-secondary);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.entry-right{text-align:right;flex-shrink:0}
.year-field{font-size:12px;color:var(--color-text-secondary);width:52px;text-align:center;border:0.5px solid var(--color-border-secondary);border-radius:4px;padding:2px 4px;background:var(--color-background-secondary);color:var(--color-text-primary)}
.year-field:focus{outline:none;border-color:#378ADD}
.stats-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:1rem}
.stat{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:.75rem 1rem}
.stat-label{font-size:12px;color:var(--color-text-secondary)}
.stat-val{font-size:22px;font-weight:500;margin-top:2px}
.section-title{font-size:13px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.05em;margin:1rem 0 .5rem}
.alert{padding:.75rem 1rem;border-radius:var(--border-radius-md);font-size:13px;margin-bottom:.75rem}
.alert-info{background:#E6F1FB;color:#0C447C;border:0.5px solid #B5D4F4}
.alert-err{background:#FCEBEB;color:#A32D2D;border:0.5px solid #F7C1C1}
.progress-bar{height:3px;background:var(--color-border-tertiary);border-radius:2px;margin-top:.5rem}
.progress-fill{height:100%;background:#1D9E75;border-radius:2px;transition:width .3s}
.spinner{display:inline-block;width:12px;height:12px;border:2px solid var(--color-border-secondary);border-top-color:#378ADD;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:4px}
@keyframes spin{to{transform:rotate(360deg)}}
#paste-btn-label{cursor:pointer;text-decoration:underline;color:#185FA5}
.format-tag{display:inline-flex;align-items:center;gap:4px;font-size:12px;padding:3px 10px;border-radius:20px;font-weight:500}
</style>

<div class="wrap">
<h2 class="sr-only">Player progress bridge — import player export JSON and sync with series-project</h2>

<div id="import-section">
  <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
    <div style="font-size:14px;font-weight:500">Drop your JSON file here</div>
    <p>Player export (<code>mpv-progress.json</code>) or series-project (<code>series.json</code>) both supported</p>
    <p style="margin-top:.5rem"><label id="paste-btn-label">or click to browse</label> &nbsp;·&nbsp; or paste below</p>
    <input type="file" id="file-input" accept=".json" style="display:none">
  </div>
  <textarea id="paste-area" placeholder='Paste JSON here — either {"SeriesName":{...}} player format or [{id,title,year,rating}] series-project format'></textarea>
  <div class="btn-row">
    <button class="primary" onclick="handleImport()">Import JSON</button>
    <button onclick="loadSample()">Load sample</button>
  </div>
  <div id="import-err"></div>
</div>

<div id="main-section" style="display:none;margin-top:1.5rem">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:.75rem">
    <div id="format-tag"></div>
    <span style="font-size:13px;color:var(--color-text-secondary)" id="source-desc"></span>
    <button style="margin-left:auto;font-size:12px" onclick="resetAll()">← Import another</button>
  </div>

  <div class="stats-row" id="stats-row"></div>

  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem;align-items:center">
    <button class="primary" id="fetch-years-btn" onclick="fetchAllYears()" style="display:none">Fetch missing years via AI</button>
    <span id="fetch-status" style="font-size:12px;color:var(--color-text-secondary)"></span>
    <div style="margin-left:auto;display:flex;gap:8px;flex-wrap:wrap">
      <button onclick="exportPlayerFormat()">Export player JSON</button>
      <button onclick="exportSeriesFormat()">Export series-project JSON</button>
      <button class="primary" onclick="exportEnhancedFormat()">Export enhanced JSON</button>
    </div>
  </div>

  <div id="progress-bar-wrap" style="display:none;margin-bottom:1rem">
    <div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:4px" id="progress-label"></div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>

  <div id="alert-area"></div>

  <div class="section-title">Entries (<span id="entry-count">0</span>)</div>
  <div id="entry-list"></div>
</div>
</div>

<script>
let entries = [];
let sourceFormat = null;

const SAMPLE_PLAYER = {
  "House.M.D": {"url":"https://example.com/House.M.D/S01/720p/","season":3,"episode":7,"timestamp":1840,"updatedAt":"2025-01-15T20:00:00Z","finished":false,"isMovie":false},
  "Breaking.Bad": {"url":"https://example.com/Breaking.Bad/S01/1080p/","season":5,"episode":16,"timestamp":0,"updatedAt":"2025-02-20T14:00:00Z","finished":true},
  "Interstellar.2014.mkv": {"url":"https://example.com/films/Interstellar.2014.mkv","season":1,"episode":0,"timestamp":4520,"updatedAt":"2025-03-01T10:00:00Z","isMovie":true},
  "Suits": {"url":"https://example.com/Suits/S01/720p/","season":2,"episode":3,"timestamp":600,"updatedAt":"2025-03-10T18:00:00Z","finished":false},
  "The.Office": {"url":"https://example.com/The.Office/S01/","season":1,"episode":0,"timestamp":0,"updatedAt":"2025-03-12T22:00:00Z","finished":false}
};

function formatTime(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=Math.floor(s%60);return h>0?`${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`:`${m}:${String(sec).padStart(2,'0')}`}

function renderProgress(e){
  if(e.finished) return '<span class="badge badge-green">✓ finished</span>';
  if(e.isMovie) return e.timestamp>0?`<span class="badge badge-amber">@ ${formatTime(e.timestamp)}</span>`:'<span class="badge badge-gray">movie</span>';
  const ep=`S${e.season}E${String(e.episode+1).padStart(2,'0')}`;
  const t=e.timestamp>0?` @ ${formatTime(e.timestamp)}`:'';
  return `<span class="badge badge-blue">${ep}${t}</span>`;
}

function detectFormat(obj){
  if(Array.isArray(obj)&&obj[0]&&typeof obj[0].title==='string') return 'series-project';
  if(typeof obj==='object'&&!Array.isArray(obj)){
    const v=Object.values(obj)[0];
    if(v&&typeof v.url==='string') return 'player';
  }
  return null;
}

function parsePlayer(data){
  return Object.entries(data).map(([key,p])=>({
    id:key, title:key.replace(/\./g,' ').replace(/_/g,' '),
    year:p.year||null, rating:p.rating||0,
    season:p.season||1, episode:p.episode||0, timestamp:p.timestamp||0,
    finished:p.finished||false, isMovie:p.isMovie||false, isOnetime:p.isOnetime||false,
    url:p.url, updatedAt:p.updatedAt, manualUrls:p.manualUrls
  }));
}

function parseSeriesProject(data){
  return data.map(s=>({
    id:s.id||String(Math.random()), title:s.title||'',
    year:s.year||null, rating:s.rating||0,
    season:s.progress?.season||1, episode:s.progress?.episode||0,
    timestamp:s.progress?.timestamp||0, finished:s.progress?.finished||false,
    isMovie:s.progress?.isMovie||false, url:s.progress?.url||'',
    updatedAt:s.progress?.updatedAt||null
  }));
}

function handleImport(){
  const text=document.getElementById('paste-area').value.trim();
  if(!text){showErr('Paste your JSON first.');return;}
  try{
    const obj=JSON.parse(text);
    const fmt=detectFormat(obj);
    if(!fmt){showErr('Format not recognized. Expected player export or series-project JSON.');return;}
    sourceFormat=fmt;
    entries=fmt==='player'?parsePlayer(obj):parseSeriesProject(obj);
    showMain();
  }catch(e){showErr('Invalid JSON: '+e.message);}
}

function loadSample(){
  document.getElementById('paste-area').value=JSON.stringify(SAMPLE_PLAYER,null,2);
  handleImport();
}

function showErr(msg){
  const el=document.getElementById('import-err');
  el.innerHTML=`<div class="alert alert-err" style="margin-top:.75rem">${msg}</div>`;
}

function showMain(){
  document.getElementById('import-section').style.display='none';
  document.getElementById('main-section').style.display='block';
  const fmtEl=document.getElementById('format-tag');
  fmtEl.innerHTML=sourceFormat==='player'
    ?'<span class="format-tag badge-blue">player export</span>'
    :'<span class="format-tag badge-teal">series-project</span>';
  document.getElementById('source-desc').textContent=`${entries.length} entries`;
  renderStats();
  renderEntries();
  const missing=entries.filter(e=>!e.isMovie&&!e.year).length;
  const btn=document.getElementById('fetch-years-btn');
  if(missing>0){btn.style.display='';btn.textContent=`Fetch missing years via AI (${missing} series)`;}
  else btn.style.display='none';
}

function renderStats(){
  const finished=entries.filter(e=>e.finished).length;
  const movies=entries.filter(e=>e.isMovie).length;
  const series=entries.filter(e=>!e.isMovie).length;
  const withYear=entries.filter(e=>e.year).length;
  document.getElementById('stats-row').innerHTML=`
    <div class="stat"><div class="stat-label">Total</div><div class="stat-val">${entries.length}</div></div>
    <div class="stat"><div class="stat-label">Series</div><div class="stat-val">${series}</div></div>
    <div class="stat"><div class="stat-label">Movies</div><div class="stat-val">${movies}</div></div>
    <div class="stat"><div class="stat-label">Finished</div><div class="stat-val">${finished}</div></div>
  `;
}

function renderEntries(){
  document.getElementById('entry-count').textContent=entries.length;
  const container=document.getElementById('entry-list');
  container.innerHTML=entries.map((e,i)=>`
    <div class="entry" id="entry-${i}">
      <div class="entry-main">
        <div class="entry-title">${e.title}</div>
        <div class="entry-meta">
          ${renderProgress(e)}
          ${e.isMovie?'<span class="badge badge-gray">movie</span>':''}
          ${e.isOnetime?'<span class="badge badge-amber">one-time</span>':''}
          ${e.updatedAt?`<span style="color:var(--color-text-tertiary)">${new Date(e.updatedAt).toLocaleDateString()}</span>`:''}
        </div>
      </div>
      <div class="entry-right">
        <input class="year-field" type="number" placeholder="year" value="${e.year||''}" min="1900" max="2030"
          onchange="entries[${i}].year=this.value?parseInt(this.value):null;renderStats()" 
          id="year-${i}" title="Air year">
        ${e.year?'':'<div id="year-status-'+i+'" style="font-size:10px;color:var(--color-text-tertiary);text-align:center;margin-top:2px">no year</div>'}
      </div>
    </div>
  `).join('');
}

async function fetchAllYears(){
  const toFetch=entries.map((e,i)=>({e,i})).filter(({e})=>!e.isMovie&&!e.year);
  if(!toFetch.length) return;
  const btn=document.getElementById('fetch-years-btn');
  btn.disabled=true;
  const wrap=document.getElementById('progress-bar-wrap');
  wrap.style.display='block';
  let done=0;
  function updateProgress(){
    done++;
    const pct=Math.round(done/toFetch.length*100);
    document.getElementById('progress-fill').style.width=pct+'%';
    document.getElementById('progress-label').textContent=`Fetching years… ${done}/${toFetch.length}`;
  }
  const titles=toFetch.map(({e})=>e.title);
  const statusEl=document.getElementById('fetch-status');
  statusEl.innerHTML='<span class="spinner"></span>Asking Claude for years…';
  try{
    const prompt=`For each TV show in this list, return ONLY a JSON object mapping title to the year it first aired (null if unknown). No other text.\n\nTitles: ${JSON.stringify(titles)}`;
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        messages:[{role:'user',content:prompt}]
      })
    });
    const data=await resp.json();
    const text=data.content?.find(c=>c.type==='text')?.text||'{}';
    const clean=text.replace(/```json|```/g,'').trim();
    let yearMap={};
    try{yearMap=JSON.parse(clean);}catch{}
    for(const {e,i} of toFetch){
      const yr=yearMap[e.title]||yearMap[e.id];
      if(yr){
        e.year=parseInt(yr);
        const inp=document.getElementById('year-'+i);
        if(inp) inp.value=e.year;
        const st=document.getElementById('year-status-'+i);
        if(st) st.remove();
      }
      updateProgress();
    }
    statusEl.textContent='Years fetched!';
    renderStats();
    const stillMissing=entries.filter(e=>!e.isMovie&&!e.year).length;
    if(stillMissing>0){btn.textContent=`Retry missing (${stillMissing})`;btn.disabled=false;}
    else{btn.style.display='none';wrap.style.display='none';}
  }catch(err){
    statusEl.innerHTML=`<span style="color:var(--color-text-danger)">Error: ${err.message}</span>`;
    btn.disabled=false;
  }
}

function exportPlayerFormat(){
  const out={};
  for(const e of entries){
    out[e.id]={url:e.url||'',season:e.season,episode:e.episode,timestamp:e.timestamp,
      finished:e.finished,isMovie:e.isMovie,isOnetime:e.isOnetime,
      updatedAt:e.updatedAt,manualUrls:e.manualUrls,year:e.year};
  }
  download('mpv-progress.json',JSON.stringify(out,null,2));
}

function exportSeriesFormat(){
  const out=entries.map((e,i)=>({id:String(i+1),title:e.title,year:e.year||null,rating:e.rating||0}));
  download('series.json',JSON.stringify(out,null,2));
}

function exportEnhancedFormat(){
  const out=entries.map((e,i)=>({
    id:String(i+1),title:e.title,year:e.year||null,rating:e.rating||0,
    progress:{season:e.season,episode:e.episode,timestamp:e.timestamp,
      finished:e.finished,isMovie:e.isMovie,url:e.url,updatedAt:e.updatedAt}
  }));
  download('series-enhanced.json',JSON.stringify(out,null,2));
}

function download(filename,text){
  const a=document.createElement('a');
  a.href='data:application/json;charset=utf-8,'+encodeURIComponent(text);
  a.download=filename; a.click();
}

function resetAll(){
  entries=[];sourceFormat=null;
  document.getElementById('paste-area').value='';
  document.getElementById('import-err').innerHTML='';
  document.getElementById('import-section').style.display='';
  document.getElementById('main-section').style.display='none';
}

const dz=document.getElementById('drop-zone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag')});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
dz.addEventListener('drop',e=>{
  e.preventDefault();dz.classList.remove('drag');
  const file=e.dataTransfer.files[0];
  if(!file) return;
  const r=new FileReader();
  r.onload=ev=>{document.getElementById('paste-area').value=ev.target.result;handleImport();};
  r.readAsText(file);
});
document.getElementById('file-input').addEventListener('change',e=>{
  const file=e.target.files[0];if(!file) return;
  const r=new FileReader();
  r.onload=ev=>{document.getElementById('paste-area').value=ev.target.result;handleImport();};
  r.readAsText(file);
});
</script>
